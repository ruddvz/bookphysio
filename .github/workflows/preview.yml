name: Preview Deployment

# Validates that `vercel build` succeeds with preview env (Vercel CLI + pulled env).
# Actual preview URLs are deployed by the Vercel GitHub app — we do NOT run
# `vercel deploy` here, because that doubles deployments per PR push and hits
# Vercel hobby-team rate limits (failing the Vercel status check on the PR).

on:
  pull_request:
    branches: [main]

concurrency:
  group: vercel-preview-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check Vercel secrets
        id: check
        shell: bash
        env:
          HAS_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          HAS_ORG: ${{ secrets.VERCEL_ORG_ID != '' }}
          HAS_PROJECT: ${{ secrets.VERCEL_PROJECT_ID != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ] && [ "$HAS_ORG" = "true" ] && [ "$HAS_PROJECT" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Vercel preview build. Add VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets."
          fi

  vercel-preview-build:
    name: Vercel preview build (smoke)
    needs: preflight
    if: ${{ needs.preflight.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Project (Vercel)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Note on preview URL
        run: |
          echo "::notice::Preview deployment and URL are provided by the Vercel GitHub integration; this job only verifies \`vercel build\`."
