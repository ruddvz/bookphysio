name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build env vars
        # Placeholders let the Supabase SDK initialise without throwing during
        # static export. API routes are not served by GitHub Pages anyway.
        # Real secrets (repo Settings → Secrets) override these.
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}" >> $GITHUB_ENV
          echo "NEXT_TELEMETRY_DISABLED=1" >> $GITHUB_ENV

      - name: Stash API route handlers (incompatible with static export)
        # Keep contracts/ in place — UI pages import types from there.
        # Only remove route.ts files so Next.js doesn't try to statically export them.
        run: |
          find src/app/api -name "route.ts" | while read f; do
            mkdir -p /tmp/api_routes/$(dirname $f)
            mv "$f" "/tmp/api_routes/$f"
          done

      - name: Build static export
        run: npm run build

      - name: Restore API route handlers
        if: always()
        run: |
          find /tmp/api_routes/src/app/api -name "route.ts" 2>/dev/null | while read f; do
            rel="${f#/tmp/api_routes/}"
            mv "$f" "$rel"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
